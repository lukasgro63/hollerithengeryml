name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-push:
    name: build-push (${{ matrix.service }})
    needs: ci
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        service: [web, api]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lukasgro63/hollerithengeryml/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - name: Build and push (api)
        if: matrix.service == 'api'
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push (web)
        if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ vars.SITE_DOMAIN }}/api
            NEXT_PUBLIC_SITE_URL=http://${{ vars.SITE_DOMAIN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: deploy
    needs: build-push
    runs-on: ubuntu-24.04
    env:
      PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
      SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
    steps:
      - name: Trigger Portainer stack update
        run: |
          response=$(curl -sk -o /dev/null -w '%{http_code}' -X POST "$PORTAINER_WEBHOOK_URL")
          if [ "$response" != "204" ] && [ "$response" != "200" ]; then
            echo "Portainer webhook failed: HTTP $response" >&2
            exit 1
          fi
          echo "Portainer webhook triggered: HTTP $response"

      - name: Wait for stack to pull and restart
        run: sleep 45

      - name: Smoke test API health
        run: |
          status=$(curl -sf -o /dev/null -w '%{http_code}' "http://$SITE_DOMAIN/api/v1/health")
          if [ "$status" != "200" ]; then
            echo "smoke test failed: HTTP $status" >&2
            exit 1
          fi
          echo "smoke test ok: HTTP $status"
