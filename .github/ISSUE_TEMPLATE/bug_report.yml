name: Bug report
description: Report something that is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Open the calculator
        2. Enter ...
        3. Click "Calculate energy"
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Browser, OS, or deployment context."
      placeholder: "Chrome 124 / macOS 15 / Docker"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if they help illustrate the issue.
