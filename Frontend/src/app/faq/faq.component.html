<div class="faq-container">
  <h1>FAQ</h1>
  <mat-accordion multi="false">
    <mat-expansion-panel *ngFor="let faq of faqs">
      <mat-expansion-panel-header>
        {{ faq.question }}
      </mat-expansion-panel-header>
      <p>{{ faq.answer }}</p>
    </mat-expansion-panel>
  </mat-accordion>
</div>
