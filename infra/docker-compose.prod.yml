services:
  caddy:
    image: caddy:2-alpine
    container_name: hollerith-caddy
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - hollerith

  web:
    image: ghcr.io/lukasgro63/hollerithengeryml/web:latest
    container_name: hollerith-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://${SITE_DOMAIN}
      NEXT_PUBLIC_SITE_URL: http://${SITE_DOMAIN}
    expose:
      - "3000"
    networks:
      - hollerith
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    image: ghcr.io/lukasgro63/hollerithengeryml/api:latest
    container_name: hollerith-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: info
      ALLOWED_ORIGINS: http://${SITE_DOMAIN}
      PREDICTIONS_RATE_LIMIT_PER_MINUTE: "30"
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - hollerith
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health',timeout=3).getcode()==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  hollerith:
    name: hollerith
    driver: bridge

configs:
  caddyfile:
    content: |
      :80 {
        encode zstd gzip

        header {
          X-Content-Type-Options "nosniff"
          X-Frame-Options "SAMEORIGIN"
          Referrer-Policy "strict-origin-when-cross-origin"
          Permissions-Policy "camera=(), microphone=(), geolocation=()"
          -Server
        }

        @api path /api/*

        handle @api {
          reverse_proxy api:8000
        }

        handle {
          reverse_proxy web:3000
        }

        log {
          output stdout
          format json
          level INFO
        }
      }
